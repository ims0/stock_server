<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}" />
    <style>
      :root {
        color-scheme: light;
        --bg: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #334155 100%);
        --card: rgba(255, 255, 255, 0.95);
        --text: #0f172a;
        --muted: #64748b;
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --danger: #dc2626;
        --border: #dbe4f0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .login-shell {
        width: min(92vw, 420px);
      }
      .login-card {
        background: var(--card);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 22px;
        padding: 36px 32px 28px;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.28);
      }
      h1 {
        margin: 0 0 24px;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-align: center;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
      }
      .field label {
        font-size: 14px;
        font-weight: 600;
        color: #334155;
      }
      .field input {
        width: 100%;
        height: 44px;
        padding: 0 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .field input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      }
      .actions {
        display: grid;
        gap: 12px;
        margin-top: 20px;
      }
      .button {
        width: 100%;
        height: 46px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .button.primary {
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: #fff;
      }
      .button.secondary {
        background: #e2e8f0;
        color: #0f172a;
      }
      .error {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 12px;
        background: #fef2f2;
        color: var(--danger);
        border: 1px solid #fecaca;
        font-size: 14px;
      }
      .hint {
        margin-top: 14px;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main class="login-shell">
      <section class="login-card">
        <h1>登录服务</h1>

        <form method="post">
          <input type="hidden" name="next" value="{{ next_url }}" />
          <div class="field">
            <label for="username">用户名</label>
            <input id="username" name="username" type="text" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="password">密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </div>
          <div class="actions">
            <button class="button primary" type="submit">登录</button>
          </div>
        </form>

        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}

        <p class="hint">默认账号可以在“密码管理”页面中查看和维护。管理员可创建、重置或删除用户。</p>
      </section>
    </main>
  </body>
</html>
