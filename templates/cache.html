<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K线缓存管理</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <div>
          <h1>K线缓存管理</h1>
          <p class="subtle">按股票维度查看缓存时间段，可按股票清理缓存。</p>
        </div>
        <div class="header-actions">
          <a class="link-button ghost" href="{{ url_for('index') }}">返回查询</a>
          <button id="refresh-cache" class="link-button">刷新列表</button>
          <button id="clear-all-cache" class="link-button danger">清空全部缓存</button>
        </div>
      </header>

      <section class="card">
        <p id="cache-message" class="message"></p>
        <div class="table-wrap">
          <table class="cache-table">
            <thead>
              <tr>
                <th>市场</th>
                <th>代码</th>
                <th>缓存区间</th>
                <th>条数</th>
                <th>最后更新</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="cache-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="{{ url_for('static', filename='js/cache.js') }}"></script>
  </body>
</html>
