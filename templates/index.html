<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>股票K线查看</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}" />
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <h1>股票K线图</h1>
        <a class="link-button" href="{{ url_for('cache_page') }}">缓存管理</a>
      </header>

      <form id="query-form" class="query-form">
        <label>
          股票代码
          <select id="code-select" name="code-select">
            <option value="manual">手动输入</option>
          </select>
          <input
            id="code-input"
            name="code-input"
            type="text"
            placeholder="支持汉字搜索或代码输入，例如 腾讯 / 600519 / 00700"
          />
        </label>

        <label>
          开始日期
          <input id="start_date" name="start_date" type="date" value="{{ default_start }}" />
        </label>

        <label>
          结束日期
          <input id="end_date" name="end_date" type="date" value="{{ default_end }}" />
        </label>

        <label>
          快速时段
          <select id="date-preset">
            <option value="">自定义</option>
            <option value="3">近 3 个月</option>
            <option value="6" selected>近 6 个月</option>
            <option value="9">近 9 个月</option>
            <option value="12">近 1 年</option>
            <option value="18">近 1.5 年</option>
            <option value="24">近 2 年</option>
          </select>
        </label>

        <label>
          数据源
          <select id="source" name="source">
            <option value="auto">自动</option>
            <option value="akshare">AkShare</option>
            <option value="sina">新浪财经</option>
            <option value="tushare">TuShare</option>
            <option value="yfinance">Yahoo Finance</option>
            <option value="alphavantage">Alpha Vantage</option>
          </select>
        </label>

        <button type="button" id="check-sources" class="link-button ghost">检测数据源</button>

        <button type="submit">查询</button>
      </form>

      <p id="message" class="message"></p>
      <div id="source-status" class="source-status"></div>
      <div id="ma-controls" class="ma-controls">
        <span class="ma-controls-label">均线：</span>
        <label class="ma-toggle"><input type="checkbox" id="toggle-ma5" checked /><span style="color:#f59e0b;">MA5</span></label>
        <label class="ma-toggle"><input type="checkbox" id="toggle-ma10" /><span style="color:#3b82f6;">MA10</span></label>
      </div>
      <div id="trade-controls" class="trade-controls">
        <span class="trade-controls-label">交易模拟：</span>
        <label class="trade-input-group">
          <span style="color:#16a34a;font-weight:600;">买入价</span>
          <input type="number" id="buy-line-input" step="0.1" min="0" />
        </label>
        <label class="trade-input-group">
          <span style="color:#dc2626;font-weight:600;">卖出价</span>
          <input type="number" id="sell-line-input" step="0.1" min="0" />
        </label>
        <div id="trade-stats" class="trade-stats"></div>
        <button type="button" id="optimize-btn" class="link-button ghost">最优策略</button>
      </div>
      <div id="chart" class="chart"></div>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
